# Architectural-rule guards. Belt-and-suspenders against runtime
# enforcement so violations get caught at PR review.
#
# The runtime egress guard lives in backend/lib/server_http.py:
#   - ServerHttpClient blocks calls to Akamai DOB hosts at request time
#   - Default follow_redirects=False; opt-in re-validates every hop
#
# These CI rules cover the bypass surface that the runtime guard can't:
#   1. The worker (dob_worker/) must NOT import the backend's
#      ServerHttpClient — pulling in the blocklist would brick the
#      one process that's supposed to talk to Akamai.
#   2. Backend code must use ServerHttpClient — no raw httpx.AsyncClient,
#      no sync httpx. Both bypass the wrapper.
#
# Note on URL literals: a810-*.nyc.gov strings DO appear in backend/
# (server.py, permit_renewal.py) — they're deeplink builders that
# return URLs as data for the user's browser to navigate to. The
# server itself never fetches them. Enforcement is at the call site
# (Rule 2), not at the literal site.

name: architectural-rules

on:
  push:
    branches: [main]
  pull_request:

jobs:
  worker-must-not-import-server-http:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Worker must not import backend's ServerHttpClient
        run: |
          set -e
          # The worker is the intentional Akamai caller. Pulling in
          # the egress guard would refuse all its requests.
          if git grep -nE 'from\s+backend\.lib\.server_http|from\s+lib\.server_http|^\s*import\s+server_http' \
               -- 'dob_worker/'; then
            echo "ERROR: Worker imported the backend's egress guard."
            echo "Worker uses raw httpx — see dob_worker/README.md."
            exit 1
          fi

  no-sync-httpx-in-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend must use ServerHttpClient (no sync httpx, no raw AsyncClient)
        run: |
          set -e
          # Sync httpx never appears in backend today; this guard
          # keeps it that way. ServerHttpClient is async-only.
          if git grep -nE 'httpx\.Client\b|httpx\.(get|post|put|delete|patch|head|request)\(' \
               -- 'backend/' \
               ':!backend/lib/server_http.py' \
               ':!backend/tests/'; then
            echo "ERROR: Sync httpx call found in backend/. Use ServerHttpClient (async)."
            exit 1
          fi
          # Direct httpx.AsyncClient instantiation outside the wrapper
          # bypasses the blocklist. Codemod-then-rule.
          if git grep -nE 'httpx\.AsyncClient\(' \
               -- 'backend/' \
               ':!backend/lib/server_http.py' \
               ':!backend/tests/'; then
            echo "ERROR: Direct httpx.AsyncClient(...) call in backend/."
            echo "Use ServerHttpClient from backend/lib/server_http.py instead."
            exit 1
          fi
