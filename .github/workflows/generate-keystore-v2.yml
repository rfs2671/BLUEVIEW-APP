name: Generate Keystore V2
on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate JKS keystore
        run: |
          keytool -genkeypair -v \
            -keystore release.jks \
            -alias my-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -storepass mypassword123 \
            -keypass mypassword123 \
            -dname "CN=Blueview, OU=Mobile, O=Blueview, L=City, ST=State, C=US"
          
      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore-jks
          path: release.jks
