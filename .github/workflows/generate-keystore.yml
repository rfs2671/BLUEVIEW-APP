name: Generate Keystore
on: workflow_dispatch
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias my-key -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass mypassword123 -keypass mypassword123 \
            -dname "CN=MyApp, OU=Dev, O=MyCompany, L=City, S=State, C=US"
          
      - name: Encode keystore
        run: base64 release.keystore > keystore.txt
          
      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            release.keystore
            keystore.txt
